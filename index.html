<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURAJ FF SERVER | CLOUD LIVE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00ffcc; --admin: #ff4b2b; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #login-screen { background: var(--glass); backdrop-filter: blur(15px); padding: 50px; border-radius: 24px; border: 1px solid var(--border); width: 320px; text-align: center; }
        #dashboard-screen { display: none; width: 95%; max-width: 1100px; padding: 40px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: #000; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .welcome-text { font-size: 35px; font-weight: 800; margin-bottom: 10px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .task-card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 20px; cursor: pointer; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: var(--glass); border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--neon); background: rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0d1117; padding: 30px; border-radius: 20px; border: 1px solid var(--neon); width: 320px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>SURΛJ FF</h1>
        <input type="tel" id="userMobile" placeholder="Mobile Number">
        <input type="password" id="userPass" placeholder="Password">
        <button class="btn" onclick="checkAccess()">Enter Server</button>
        <p id="error-msg" style="color: red; font-size: 12px;"></p>
    </div>

    <div id="dashboard-screen">
        <div class="welcome-text">WELCOME PRIVATE SERVER</div>
        <p style="color: #2ecc71;">● DATABASE STATUS: CONNECTED</p>

        <div style="background: var(--glass); padding: 15px; border-radius: 10px; border-left: 4px solid gold; text-align: left; margin: 20px 0;">
            <span style="color: gold; font-weight: bold;">ROOM:</span> <span id="disp-id">--</span> | <span id="disp-pass">--</span>
        </div>

        <div class="work-grid">
            <div class="task-card" onclick="openM('entry-modal')"><h3>📝 Entry</h3><p>Register Teams</p></div>
            <div class="task-card admin-only" style="display:none;" onclick="openM('room-modal')"><h3 style="color:red;">🔑 Room</h3><p>Set ID/Pass</p></div>
        </div>

        <table>
            <thead><tr><th>Team</th><th>Player</th><th>UID</th><th>Location</th><th>Action</th></tr></thead>
            <tbody id="player-list"></tbody>
        </table>

        <button onclick="location.reload()" style="margin-top: 40px; background: none; border: none; color: #555; cursor: pointer;">Logout</button>
    </div>

    <div id="entry-modal" class="modal"><div class="modal-content">
        <h2>New Entry</h2>
        <input type="text" id="tN" placeholder="Team Name"><input type="text" id="tL" placeholder="Location">
        <input type="text" id="pN" placeholder="Player Name"><input type="text" id="pU" placeholder="UID">
        <button class="btn" onclick="saveData()">Save To Cloud</button>
        <button class="btn" style="background:none; color:#888;" onclick="closeM('entry-modal')">Close</button>
    </div></div>

    <div id="room-modal" class="modal"><div class="modal-content">
        <h2>Set Room</h2>
        <input type="text" id="rid" placeholder="Room ID"><input type="text" id="rpas" placeholder="Pass">
        <button class="btn" onclick="setRoom()">Update</button>
        <button class="btn" style="background:none; color:#888;" onclick="closeM('room-modal')">Close</button>
    </div></div>

    <script>
        // AAPKA LIVE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyD6Z9TxMn01dqbeClGh4oeKPDlx-EAjuO8",
            authDomain: "ff-server-suraj.firebaseapp.com",
            projectId: "ff-server-suraj",
            databaseURL: "https://ff-server-suraj-default-rtdb.firebaseio.com/", // YE RAHA AAPKA URL
            storageBucket: "ff-server-suraj.firebasestorage.app",
            messagingSenderId: "73956544050",
            appId: "1:73956544050:web:5210abe457cb4275c3362b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const members = [
            {n:"Uday", m:"9506591022", p:"uday@22"},
            {n:"Dipanshu", m:"8252302445", p:"dipanshu@45"},
            {n:"Rajveer", m:"8604642863", p:"raj@63"},
            {n:"Suraj", m:"7355098747", p:"suraj@143"}
        ];

        let currentUser = ""; let isAdmin = false;

        function checkAccess() {
            let m = document.getElementById('userMobile').value.trim();
            let p = document.getElementById('userPass').value.trim();
            let f = members.find(x => x.m === m && x.p === p);
            if(f) {
                currentUser = f.n;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('dashboard-screen').style.display='block';
                if(f.m === "7355098747") { 
                    isAdmin = true; 
                    document.querySelectorAll('.admin-only').forEach(e => e.style.display="block");
                }
                listenData(); listenRoom();
            } else { document.getElementById('error-msg').innerText="Invalid!"; }
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function saveData() {
            let data = {
                t: document.getElementById('tN').value, l: document.getElementById('tL').value,
                n: document.getElementById('pN').value, u: document.getElementById('pU').value,
                by: currentUser
            };
            db.ref('players').push(data);
            closeM('entry-modal');
        }

        function listenData() {
            db.ref('players').on('value', (snap) => {
                let h = "";
                snap.forEach(child => {
                    let v = child.val();
                    h += `<tr><td>${v.t}</td><td>${v.n}</td><td>${v.u}</td><td>${v.l}</td>
                    <td>${isAdmin ? `<button onclick="del('${child.key}')" style="color:red; background:none; border:none; cursor:pointer;">🗑️</button>` : "-"}</td></tr>`;
                });
                document.getElementById('player-list').innerHTML = h;
            });
        }

        function setRoom() {
            db.ref('room').set({ id: document.getElementById('rid').value, pass: document.getElementById('rpas').value });
            closeM('room-modal');
        }

        function listenRoom() {
            db.ref('room').on('value', (snap) => {
                let v = snap.val();
                if(v) { document.getElementById('disp-id').innerText = v.id; document.getElementById('disp-pass').innerText = v.pass; }
            });
        }

        function del(key) { if(confirm("Hataun?")) db.ref('players').child(key).remove(); }
    </script>
</body>
</html>
