<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FF Tournament - Complete Profile</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #e94560 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .box { background: rgba(26, 26, 46, 0.9); padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(46, 204, 113, 0.5); width: 320px; text-align: center; }
        h2 { color: white; }
        p { color: #2ecc71; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f3460; border: 2px solid #ccc; border-radius: 8px; color: white; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 12px; margin-top: 20px; background: #2ecc71; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Setup Profile</h2>
        <p>✓ Number Verified</p>
        <input type="text" placeholder="Full Name">
        <input type="number" placeholder="Free Fire UID">
        <input type="password" placeholder="Create Password">
        <button class="save-btn">SAVE & START</button>
    </div>
</body>
</html>
